# ADR-006 阶段 2：平台公网 + DormGuard 内网 loopback
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oxelia51.com www.oxelia51.com;

    ssl_certificate /etc/letsencrypt/live/oxelia51.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oxelia51.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/Oxelia51/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Oxelia51-Access-Token $http_x_oxelia51_access_token;
        client_max_body_size 10m;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080/api/health;
        allow 127.0.0.1;
        deny all;
    }

    # 旧 DormGuard 独立站书签 → 平台工具页
    location = /login {
        return 302 /tools/dormguard;
    }

    # 避免浏览器长期缓存 index.html 导致仍引用旧 hash 的 JS bundle
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name oxelia51.com www.oxelia51.com;
    return 301 https://$host$request_uri;
}
