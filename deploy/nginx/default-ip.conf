# IP 直连（备案关 DNS 期间）— 全部 /api/ 走 Oxelia51 :8080
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/Oxelia51/frontend/dist;
    index index.html;

    # 诊断：curl http://IP/debug-auth -H "Authorization: Bearer xxx"
    location = /debug-auth {
        default_type text/plain;
        return 200 "remote=$remote_addr\nhost=$host\nauthorization=$http_authorization\nx_oxelia_token=$http_x_oxelia51_access_token\n";
    }

    # GitHub webhook 接收端点（转发到本地 receiver.py:9000）
    location = /webhook {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-GitHub-Event $http_x_github_event;
        proxy_set_header X-GitHub-Delivery $http_x_github_delivery;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Oxelia51-Access-Token $http_x_oxelia51_access_token;
        client_max_body_size 10m;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Upstream-Status $upstream_status always;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 8081;
    server_name _;

    root /opt/Oxelia51/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Oxelia51-Access-Token $http_x_oxelia51_access_token;
        client_max_body_size 10m;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
