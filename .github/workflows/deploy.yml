name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# 同一分支新 push 取消旧 run，避免并发部署
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Backend vet + test
        working-directory: backend
        run: |
          go vet ./...
          go test ./...

      - name: Backend cross-compile (linux/amd64)
        working-directory: backend
        run: |
          mkdir -p ../release/backend
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../release/backend/oxelia51-server ./cmd/server
          cp -r migrations ../release/backend/migrations

      - name: Frontend install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build
          cp -r dist ../release/frontend-dist

      - name: Stage deploy scripts
        run: cp -r deploy release/deploy

      - name: Verify release structure
        run: |
          test -f release/backend/oxelia51-server
          test -f release/backend/migrations/003_auth_v11.up.sql
          test -f release/deploy/apply-release.sh
          test -d release/frontend-dist
          echo "release structure OK"

      - name: Package release tarball
        run: tar czf oxelia51-release.tar.gz -C release .

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxelia-release
          path: oxelia51-release.tar.gz
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: build-test
    # 仅 master 分支 push 与手动触发才部署；PR 只跑 build-test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch'
    # self-hosted runner = 生产服务器本身，无需 SSH/SCP
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: oxelia-release

      - name: Extract and apply release
        run: |
          set -euo pipefail
          WORK="/tmp/oxelia51-release-$$"
          trap 'rm -rf "$WORK" oxelia51-release.tar.gz' EXIT
          mkdir -p "$WORK"
          tar xzf oxelia51-release.tar.gz -C "$WORK"
          bash "$WORK/deploy/apply-release.sh" "$WORK"

      - name: Health check
        run: |
          curl -fsS --max-time 10 http://127.0.0.1:8080/api/health
          echo ""
          echo "部署完成: https://oxelia51.com / http://47.108.202.199"
