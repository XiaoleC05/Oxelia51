name: Deploy Oxelia51

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-oxelia51
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build backend binary
        run: |
          cd backend
          go mod tidy
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o oxelia51-server ./cmd/server

      - name: Pack release bundle
        run: |
          mkdir -p release/backend/migrations release/frontend-dist release/deploy
          cp backend/oxelia51-server release/backend/
          rsync -a backend/migrations/ release/backend/migrations/
          rsync -a --delete frontend/dist/ release/frontend-dist/
          rsync -a deploy/ release/deploy/
          chmod +x release/deploy/*.sh release/deploy/monitor/*.sh 2>/dev/null || true
          tar czf oxelia51-release.tar.gz -C release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxelia51-release
          path: oxelia51-release.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: oxelia51-release

      - name: Apply release on server
        run: |
          set -euo pipefail
          TARBALL="${GITHUB_WORKSPACE}/oxelia51-release.tar.gz"
          CI_SCRIPT="/opt/Oxelia51/deploy/ci-deploy.sh"
          if [ -f "$CI_SCRIPT" ]; then
            sudo /usr/bin/bash "$CI_SCRIPT" "$TARBALL"
          else
            WORK="/tmp/oxelia51-release"
            rm -rf "$WORK"
            mkdir -p "$WORK"
            tar xzf "$TARBALL" -C "$WORK"
            sudo /usr/bin/bash "$WORK/deploy/apply-release.sh" "$WORK"
            rm -rf "$WORK" || true
          fi
