name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# 默认权限：仅读。release job 单独提升写权限。
permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Backend vet + test
        working-directory: backend
        run: |
          go vet ./...
          go test -race ./...

      - name: Backend cross-compile (linux/amd64)
        working-directory: backend
        run: |
          mkdir -p ../release/backend
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../release/backend/oxelia51-server ./cmd/server
          cp -r migrations ../release/backend/migrations

      - name: Frontend install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build
          cp -r dist ../release/frontend-dist

      - name: Stage deploy scripts
        run: cp -r deploy release/deploy

      - name: Verify release structure
        run: |
          test -f release/backend/oxelia51-server
          test -f release/backend/migrations/003_auth_v11.up.sql
          test -f release/deploy/apply-release.sh
          test -d release/frontend-dist
          echo "release structure OK"

      - name: Package release tarball
        run: tar czf oxelia51-release.tar.gz -C release .

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxelia-release
          path: oxelia51-release.tar.gz
          retention-days: 7

  release:
    name: Push tarball to release branch
    needs: build-test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # release job 需要写权限来 push 到 release 分支
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: oxelia-release

      - name: Push tarball to release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # 创建 orphan 分支（无历史），仅包含 tarball
          git checkout --orphan release-tmp
          git rm -rf . 2>/dev/null || true

          # 确认 tarball 存在
          ls -lh oxelia51-release.tar.gz

          git add oxelia51-release.tar.gz
          git commit -m "release: ${GITHUB_SHA::7}"

          # 强制推送到 release 分支（覆盖旧版本）
          git push origin "release-tmp:release" --force
          echo "tarball pushed to release branch"
